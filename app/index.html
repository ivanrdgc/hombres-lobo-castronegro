<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b0c14" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Juegos de mesa digitales para jugar con amigos." />
    <title>Juegos digitales</title>
    <link rel="icon" href="/favicon.svg" />
    <script>
      // Cada site de Hosting responde también en *.firebaseapp.com, pero la
      // clave de la voz (TTS) solo admite referers *.web.app: quien entre por
      // la URL antigua acabaría con síntesis 403 en el móvil. Se canonicaliza
      // ANTES de cargar nada (misma ruta, mismo estado local: el localStorage
      // de web.app es el que siempre usó la app).
      if (location.hostname.endsWith('.firebaseapp.com')) {
        location.replace(location.href.replace('.firebaseapp.com', '.web.app'));
      }
    </script>
  </head>
  <body>
    <div id="app-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
